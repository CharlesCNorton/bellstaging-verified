name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        coq_version: ['9.0']
        ocaml_version: ['4.14']
    steps:
      - uses: actions/checkout@v4

      - uses: coq-community/docker-coq-action@v1
        with:
          coq_version: ${{ matrix.coq_version }}
          ocaml_version: ${{ matrix.ocaml_version }}
          custom_script: |
            startGroup "Install QuickChick"
            opam install coq-quickchick --yes
            endGroup
            startGroup "Build main formalization"
            coqc -Q . BellStaging BellStaging.v
            endGroup
            startGroup "Run QuickChick property tests"
            coqc -Q . BellStaging BellStagingQC.v
            endGroup
