name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rocq/rocq-prover:9.0
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Install QuickChick
        run: |
          opam install coq-quickchick --yes
          eval $(opam env)

      - name: Build
        run: |
          eval $(opam env)
          coqc -Q . BellStaging BellStaging.v

      - name: QuickChick tests
        run: |
          eval $(opam env)
          coqc -Q . BellStaging BellStagingQC.v
