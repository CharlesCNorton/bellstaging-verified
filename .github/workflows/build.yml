name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work \
            rocq/rocq-prover:9.0 \
            bash -c '
              sudo chown -R coq:coq /work &&
              opam install coq-quickchick --yes &&
              eval $(opam env) &&
              coqc -Q . BellStaging BellStaging.v &&
              coqc -Q . BellStaging BellStagingQC.v
            '
