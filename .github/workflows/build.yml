name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: coq-community/docker-coq-action@v1
        with:
          custom_image: rocq/rocq-prover:9.0
          custom_script: |
            startGroup "Install QuickChick"
            opam install coq-quickchick --yes
            endGroup
            startGroup "Build"
            coqc -Q . BellStaging BellStaging.v
            endGroup
            startGroup "QuickChick tests"
            coqc -Q . BellStaging BellStagingQC.v
            endGroup
          before_script: |
            sudo chown -R coq:coq .
