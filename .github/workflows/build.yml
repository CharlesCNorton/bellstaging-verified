name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        rocq_version: ["9.0.0", "9.0.1", "9.1.1"]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache opam
        uses: actions/cache@v4
        with:
          path: /home/runner/.opam-cache
          key: opam-${{ matrix.rocq_version }}-quickchick-2.1.1

      - name: Build, test, and verify
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work \
            -v "${HOME}/.opam-cache:/opam-cache" \
            rocq/rocq-prover:${{ matrix.rocq_version }} \
            bash -c '
              set -euo pipefail
              sudo chown -R $(whoami) /work

              # Restore or install QuickChick
              if [ -d /opam-cache/default ]; then
                sudo cp -a /opam-cache/default/. $(opam var prefix)/
              else
                opam install coq-quickchick.2.1.1 --yes
                sudo mkdir -p /opam-cache/default
                sudo cp -a $(opam var prefix)/. /opam-cache/default/
              fi
              eval $(opam env)

              # Build all files via Makefile
              make

              # Run QuickChick tests and assert all pass
              QC_OUTPUT=$(coqc -Q src BellStaging src/BellStagingQC.v 2>&1)
              echo "$QC_OUTPUT"
              if echo "$QC_OUTPUT" | grep -q "Failed"; then
                echo "::error::QuickChick property test failed"
                exit 1
              fi

              # Verify proof terms
              coqchk -Q src BellStaging BellStaging.BellStaging
            '
